# ============================================================
# DrPangPsych (@drpangpsych) - YouTube Automation Workflow
# Schedule: Monday, Wednesday, Friday at 11:00 PM KST (= 9:00 AM EST / 6:00 AM PST)
# ============================================================

name: "DrPangPsych - Auto Content Upload"

on:
  # 정기 스케줄 (UTC 기준 → KST 오후 11시 = UTC 14시 = 미국 동부 오전 9시)
  schedule:
    - cron: "0 14 * * 1,3,5"  # 월(1), 수(3), 금(5) UTC 14:00 = KST 23:00 = EST 09:00

  # 수동 실행 지원
  workflow_dispatch:
    inputs:
      content_type:
        description: "Content type"
        required: false
        default: "script"
        type: choice
        options:
          - script
          - shorts
      custom_topic:
        description: "Custom topic (leave empty for auto-selection)"
        required: false
        default: ""
        type: string
      privacy_status:
        description: "Privacy status"
        required: false
        default: "private"
        type: choice
        options:
          - private
          - unlisted
          - public
      skip_upload:
        description: "Skip upload (for testing)"
        required: false
        default: false
        type: boolean

env:
  CHANNEL_ID: drpangpsych
  PYTHON_VERSION: "3.11"

jobs:
  generate-and-upload:
    name: "Generate & Upload Content"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # ── Python Setup ──
      - name: "Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── Dependencies ──
      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── ffmpeg ──
      - name: "Install ffmpeg"
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # ── Pipeline Execution ──
      - name: "Run automation pipeline"
        id: pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          YOUTUBE_REFRESH_TOKEN_DRPANGPSYCH: ${{ secrets.YOUTUBE_REFRESH_TOKEN_DRPANGPSYCH }}
        run: |
          cd scripts
          python pipeline.py ${{ env.CHANNEL_ID }} \
            --type "${{ github.event.inputs.content_type || 'script' }}" \
            --privacy "${{ github.event.inputs.privacy_status || 'private' }}" \
            ${{ github.event.inputs.custom_topic && format('--topic "{0}"', github.event.inputs.custom_topic) || '' }} \
            ${{ github.event.inputs.skip_upload == 'true' && '--skip-upload' || '' }}

      # ── Save Artifacts ──
      - name: "Save output artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "drpangpsych-output-${{ github.run_number }}"
          path: assets/output/drpangpsych/
          retention-days: 30

      # ── Summary ──
      - name: "Pipeline summary"
        if: always()
        run: |
          echo "## DrPangPsych Pipeline Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.pipeline.outputs.pipeline_status || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Title**: ${{ steps.pipeline.outputs.video_title || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Video ID**: ${{ steps.pipeline.outputs.video_id || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.pipeline.outputs.video_url || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # ── Failure Notification ──
  notify-on-failure:
    name: "Failure Notification"
    runs-on: ubuntu-latest
    needs: generate-and-upload
    if: failure()

    steps:
      - name: "Report failure"
        run: |
          echo "::error::DrPangPsych pipeline failed. Please check the logs."
          echo "## :x: Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "The DrPangPsych auto-upload pipeline has failed." >> $GITHUB_STEP_SUMMARY
          echo "Please review the Actions logs and take necessary action." >> $GITHUB_STEP_SUMMARY
